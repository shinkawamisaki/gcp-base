name: 'GCP: Create Sandbox'

on:
  workflow_dispatch:
    inputs:
      sandbox_id:
        description: 'サンドボックスの識別名 (例: my-test)'
        required: true
        type: string
      github_repo:
        description: 'デプロイを行う GitHub リポジトリ名 (例: my-org/my-repo)'
        required: true
        type: string
      expiry_days:
        description: '有効期限 (日数)'
        required: true
        default: '7'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '30'

permissions:
  contents: write # inventory.json を更新して Push するために必要
  actions: write  # gh workflow run を実行するために必要

jobs:
  update-inventory:
    name: 'Update Inventory'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update inventory.json
        run: |
          INVENTORY_PATH="governance/admin/factory/inventory.json"
          
          # 変数の準備
          SANDBOX_ID="${{ github.event.inputs.sandbox_id }}"
          GITHUB_REPO="${{ github.event.inputs.github_repo }}"
          EXPIRY_DAYS="${{ github.event.inputs.expiry_days }}"
          OWNER_EMAIL="${{ github.actor }}@users.noreply.github.com"
          
          # 具体的な削除期限日の計算 (YYYY-MM-DD)
          EXPIRY_DATE=$(date -d "+$EXPIRY_DAYS days" +%Y-%m-%d)

          # jq を使って JSON に追記
          # .sandboxes["id"] = { ... } の形式で追加します
          jq --arg id "$SANDBOX_ID" \
             --arg repo "$GITHUB_REPO" \
             --arg email "$OWNER_EMAIL" \
             --arg expiry "$EXPIRY_DATE" \
             '.sandboxes[$id] = { "github_repo": $repo, "owner_email": $email, "expiry_date": $expiry }' \
             "$INVENTORY_PATH" > inventory.tmp && mv inventory.tmp "$INVENTORY_PATH"

          echo "Inventory updated for sandbox: $SANDBOX_ID (Expires: $EXPIRY_DATE)"

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add governance/admin/factory/inventory.json
          git commit -m "feat: add new sandbox [${{ github.event.inputs.sandbox_id }}] via workflow"
          git push origin main

      - name: Trigger Factory Deployment
        run: |
          echo "🚀 Triggering Factory Deployment (platform-admin.yml)..."
          gh workflow run platform-admin.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success Message
        run: |
          echo "✅ inventory.json updated and Factory Deployment triggered."
          echo "The sandbox will be ready in a few minutes. Check Slack for the setup guide!"
