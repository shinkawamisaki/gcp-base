name: 'GCP Foundation: Admin Deployment'

on:
  push:
    branches: [ main ]
    paths:
      - 'governance/admin/**'
      - 'infra/**'
      - 'modules/**'
      - 'scripts/**'
      - '.github/workflows/platform-admin.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # 0. 変更検知
  check-changes:
    name: 'Check Changes'
    runs-on: ubuntu-latest
    outputs:
      foundation: ${{ steps.filter.outputs.foundation }}
      factory: ${{ steps.filter.outputs.factory }}
      inventory_changed: ${{ steps.filter.outputs.inventory_changed }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            foundation:
              - 'governance/admin/foundation/**'
              - 'modules/api_base/**'
              - 'modules/billing_base/**'
              - 'modules/monitoring_base/**'
              - 'modules/security_base/**'
            factory:
              - 'governance/admin/factory/**'
              - 'modules/project_factory/**'
              - 'modules/vpc_base/**'
            inventory_changed:
              - 'governance/admin/factory/inventory.json'
            workflow:
              - '.github/workflows/platform-admin.yml'

  # 1. 基盤（Foundation）のデプロイ
  deploy-foundation:
    name: 'Apply Foundation'
    needs: check-changes
    if: needs.check-changes.outputs.foundation == 'true' || needs.check-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: governance/admin/foundation
    env:
      TF_VAR_project_id:         ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_org_id:             ${{ secrets.GCP_ORG_ID }}
      TF_VAR_billing_account_id: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
      TF_VAR_gh_org_name:        ${{ vars.GH_ORG_NAME }}
      TF_VAR_gh_repo_name:       ${{ github.event.repository.name }}
      TF_VAR_app_base_name:      ${{ vars.APP_BASE_NAME }}
      TF_VAR_region:             ${{ vars.GCP_REGION }}
      TF_VAR_env:                "admin"
      TF_VAR_admin_group_email:  ${{ vars.ADMIN_GROUP_EMAIL }}
      TF_VAR_project_owner:      ${{ vars.PROJECT_OWNER }}
      TF_VAR_allowed_gh_repositories: '["${{ github.event.repository.name }}"]'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-provider'
          service_account: 'prd-terraform-runner-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply
        run: |
          cat <<EOF > backend.hcl
          bucket = "${{ vars.GCP_PROJECT_ID }}-tfstate"
          prefix = "terraform/admin/foundation/state"
          EOF
          terraform init -backend-config=backend.hcl
          terraform apply -auto-approve -input=false

  # 2. 工場（Factory）のデプロイ
  deploy-factory:
    name: 'Apply Factory'
    needs: [check-changes, deploy-foundation]
    # 💡 インベントリ変更時も確実に実行されるよう条件を網羅
    if: always() && !cancelled() && (needs.check-changes.outputs.factory == 'true' || needs.check-changes.outputs.inventory_changed == 'true' || needs.check-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: governance/admin/factory
    env:
      TF_VAR_project_id:         ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_org_id:             ${{ secrets.GCP_ORG_ID }}
      TF_VAR_billing_account_id: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
      TF_VAR_gh_org_name:        ${{ vars.GH_ORG_NAME }}
      TF_VAR_gh_repo_name:       ${{ github.event.repository.name }}
      TF_VAR_app_base_name:      ${{ vars.APP_BASE_NAME }}
      TF_VAR_region:             ${{ vars.GCP_REGION }}
      TF_VAR_env:                "admin"
      TF_VAR_admin_group_email:  ${{ vars.ADMIN_GROUP_EMAIL }}
      TF_VAR_project_owner:      ${{ vars.PROJECT_OWNER }}
      TF_VAR_allowed_gh_repositories: '["${{ github.event.repository.name }}"]'
      TF_VAR_enable_budget_pubsub: true
    steps:
      - name: Check Foundation Status
        if: needs.deploy-foundation.result == 'failure'
        run: exit 1
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Authenticate
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-provider'
          service_account: 'prd-terraform-runner-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply
        run: |
          cat <<EOF > backend.hcl
          bucket = "${{ vars.GCP_PROJECT_ID }}-tfstate"
          prefix = "terraform/admin/factory/state"
          EOF
          terraform init -backend-config=backend.hcl
          terraform apply -auto-approve -input=false
      - name: Extract Project IDs
        run: |
          PROJECTS_JSON=$(terraform output -json created_project_ids)
          echo "PROJECTS_JSON=$PROJECTS_JSON" >> $GITHUB_ENV

      # ---------------------------------------------------------------
      # 🚀 通知 ＆ GitHub Variables 同期ステップ
      # ---------------------------------------------------------------
      - name: Notify and Sync Variables
        if: success() && github.ref == 'refs/heads/main' && (needs.check-changes.outputs.inventory_changed == 'true' || github.event_name == 'workflow_dispatch')
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          PROJECTS_JSON: ${{ env.PROJECTS_JSON }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
        run: |
          # 💡 開発者用チャンネルの Webhook を取得
          SLACK_WEBHOOK_URL=$(gcloud secrets versions access latest --secret="infra-sandbox-slack-webhook" --project="${{ vars.GCP_PROJECT_ID }}")

          # 💡 管理者用チャンネルの Webhook を取得
          DEPLOY_SLACK_WEBHOOK_URL=$(gcloud secrets versions access latest --secret="infra-deploy-slack-webhook" --project="${{ vars.GCP_PROJECT_ID }}")
          export DEPLOY_SLACK_WEBHOOK_URL

          # GitHub 操作用トークンの取得          GITHUB_TOKEN=$(gcloud secrets versions access latest --secret="infra-github-token" --project="${{ vars.GCP_PROJECT_ID }}")
          
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack Webhook URL (for developers) not found. Skipping notification."
          fi

          git show HEAD^:governance/admin/factory/inventory.json > inventory_old.json 2>/dev/null || echo '{"apps":{},"sandboxes":{}}' > inventory_old.json
          
          export SLACK_WEBHOOK_URL
          export GITHUB_TOKEN
          python3 $GITHUB_WORKSPACE/scripts/notify_inventory_changes.py
