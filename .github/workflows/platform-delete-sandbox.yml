name: 'GCP: Delete Sandbox'

on:
  workflow_dispatch:
    inputs:
      sandbox_id:
        description: '削除するサンドボックスの識別名 (inventory.json 内のキー)'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  delete-inventory:
    name: 'Delete from Inventory'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove from inventory.json and Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          INVENTORY_PATH="governance/admin/factory/inventory.json"
          SANDBOX_ID="${{ github.event.inputs.sandbox_id }}"
          
          # 1. jq で削除を試みる (キーがなければ何もしない)
          if jq -e ".sandboxes | has(\"$SANDBOX_ID\")" "$INVENTORY_PATH" > /dev/null; then
            jq "del(.sandboxes[\"$SANDBOX_ID\"])" "$INVENTORY_PATH" > inventory.tmp && mv inventory.tmp "$INVENTORY_PATH"
            echo "Successfully modified inventory.json to remove $SANDBOX_ID"
          else
            echo "Notice: Sandbox ID '$SANDBOX_ID' not found in inventory.json."
          fi

          # 2. 差分をステージング
          git add "$INVENTORY_PATH"
          
          # 3. 実際に変更があった場合のみコミットとプッシュを実行
          # 💡 ここで git commit や push が失敗した場合は、exit 1 となりジョブは正常にエラー終了します。
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "fix: auto-delete expired sandbox [$SANDBOX_ID]"
            git push origin main
            echo "pushed=true" >> $GITHUB_ENV
          else
            echo "Notice: No actual changes to commit (Sandbox already removed)."
            echo "pushed=false" >> $GITHUB_ENV
          fi

      - name: Trigger Factory Deployment
        # 💡 インベントリが実際に更新された場合のみ、Terraform を起動する
        if: env.pushed == 'true'
        run: |
          echo "🚀 Triggering Factory Deployment (platform-admin.yml) to perform physical deletion..."
          gh workflow run platform-admin.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
