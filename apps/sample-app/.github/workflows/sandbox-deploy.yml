name: 'Application: Sandbox Deploy (Auto-Config)'

on:
  workflow_dispatch:
  push:
    branches: [ 'sandbox/**' ]
    paths:
      - 'infra/**'
      - '*.py'
      - 'requirements.txt'
      - '.github/workflows/sandbox-deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  # 0. 変更検知
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app:   ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            app:
              - '*.py'
              - 'requirements.txt'

  # 1. サンドボックス・デプロイ
  # 💡 vars.ID_SANDBOX が設定されている場合のみ実行
  deploy-sandbox:
    needs: check-changes
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      vars.ID_SANDBOX != '' && !contains(vars.ID_SANDBOX, 'sandbox-xxxx')
    uses: ./.github/workflows/_deploy_template.yml
    with:
      target_env: 'dev'
      project_id: ${{ vars.ID_SANDBOX }}
      app_name: ${{ vars.APP_NAME }}
      admin_project_id: ${{ vars.ADMIN_PROJECT_ID }}
      admin_project_number: ${{ vars.ADMIN_PROJECT_NUMBER }}
      deploy_infra: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.infra == 'true' }}
      deploy_app: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.app == 'true' || needs.check-changes.outputs.infra == 'true' }}
    secrets: inherit
