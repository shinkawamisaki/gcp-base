name: 'App Deployment (Smart Pipeline)'

on:
  push:
    branches: [ main ]
    paths:
      - '**'
      - '.github/workflows/app_deploy.yml'
  workflow_dispatch:
    inputs:
      target_env:
        description: '手動デプロイ先 (dev, stg, prd)'
        required: true
        default: 'stg'
        type: choice
        options: [ 'dev', 'stg', 'prd' ]

permissions:
  contents: read
  id-token: write

jobs:
  # 0. 変更検知
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app:   ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            app:
              - '*.py'
              - 'requirements.txt'

  # ---------------------------------------------------------------
  # 1. DEV 環境デプロイ
  # ---------------------------------------------------------------
  deploy-dev:
    needs: check-changes
    if: |
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'dev')) &&
      vars.ID_DEV != '' && !contains(vars.ID_DEV, 'sample-app')
    uses: ./.github/workflows/_deploy_template.yml
    with:
      target_env: 'dev'
      project_id: ${{ vars.ID_DEV }}
      app_name: ${{ vars.APP_NAME }}
      admin_project_id: ${{ vars.ADMIN_PROJECT_ID }}
      admin_project_number: ${{ vars.ADMIN_PROJECT_NUMBER }}
      deploy_infra: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.infra == 'true' }}
      deploy_app: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.app == 'true' || needs.check-changes.outputs.infra == 'true' }}
    secrets: inherit

  # ---------------------------------------------------------------
  # 2. STG 環境デプロイ
  # ---------------------------------------------------------------
  deploy-stg:
    needs: [check-changes, deploy-dev]
    if: |
      always() && 
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped') &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'stg')) &&
      vars.ID_STG != '' && !contains(vars.ID_STG, 'sample-app')
    uses: ./.github/workflows/_deploy_template.yml
    with:
      target_env: 'stg'
      project_id: ${{ vars.ID_STG }}
      app_name: ${{ vars.APP_NAME }}
      admin_project_id: ${{ vars.ADMIN_PROJECT_ID }}
      admin_project_number: ${{ vars.ADMIN_PROJECT_NUMBER }}
      deploy_infra: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.infra == 'true' }}
      deploy_app: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.app == 'true' || needs.check-changes.outputs.infra == 'true' }}
    secrets: inherit

  # ---------------------------------------------------------------
  # 3. PRD 環境デプロイ
  # ---------------------------------------------------------------
  deploy-prd:
    needs: [check-changes, deploy-stg]
    if: |
      always() && 
      (needs.deploy-stg.result == 'success' || needs.deploy-stg.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'prd') &&
      vars.ID_PRD != '' && !contains(vars.ID_PRD, 'sample-app')
    uses: ./.github/workflows/_deploy_template.yml
    with:
      target_env: 'prd'
      project_id: ${{ vars.ID_PRD }}
      app_name: ${{ vars.APP_NAME }}
      admin_project_id: ${{ vars.ADMIN_PROJECT_ID }}
      admin_project_number: ${{ vars.ADMIN_PROJECT_NUMBER }}
      deploy_infra: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.infra == 'true' }}
      deploy_app: ${{ github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.app == 'true' || needs.check-changes.outputs.infra == 'true' }}
    secrets: inherit
